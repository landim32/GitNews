services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gitnews-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - gitnews-data:/var/lib/postgresql/data

  worker:
    build:
      context: .
      dockerfile: GitNews.Worker/Dockerfile
    container_name: gitnews-worker
    depends_on:
      - postgres
    environment:
      GitHub__Token: ${GITHUB_TOKEN}
      GitHub__Owner: ${GITHUB_OWNER}
      GitHub__MaxCommits: ${GITHUB_MAXCOMMITS:-30}
      GitHub__IncludeForks: ${GITHUB_INCLUDEFORKS:-false}
      OpenAI__ApiKey: ${OPENAI_APIKEY}
      OpenAI__Model: ${OPENAI_MODEL:-gpt-4}
      OpenAI__BaseUrl: ${OPENAI_BASEURL:-https://api.openai.com/v1}
      Database__Provider: PostgreSQL
      Database__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Worker__ScheduleTime: ${WORKER_SCHEDULETIME:-19:00}
    restart: unless-stopped

volumes:
  gitnews-data:
